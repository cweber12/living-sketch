name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Grant the GITHUB_TOKEN permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; skip in-progress runs but do not
# cancel them — let them finish so the latest deploy always lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build static export
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Next.js static export is incompatible with:
      #   - middleware.ts (server-side auth redirects)
      #   - Server Actions (app/actions/auth.ts)
      # This deployment is a STATIC UI PREVIEW only.
      # Authentication and API routes do not function here.
      # Use Vercel for the full SSR deployment.
      - name: Prepare for static export
        run: |
          rm middleware.ts
          printf "'use server';\nexport async function login() {}\nexport async function register() {}\nexport async function logout() {}" \
            > app/actions/auth.ts

      - name: Build static export
        run: npm run build
        env:
          NEXT_EXPORT: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
